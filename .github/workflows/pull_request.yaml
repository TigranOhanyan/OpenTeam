name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'

      - name: Install dependencies
        run: |
          
          make generate
          go get .
          go mod tidy

      - name:  Test the code
        shell: bash
        run: |
          docker compose -f ./.dev/docker-compose.yaml --env-file ./.dev/.env -p openteam up -d
          sleep 10s          

          go test ./... -v -count=1 -p 1
          
          docker compose -f ./.dev/docker-compose.yaml --env-file ./.dev/.env -p openteam down
